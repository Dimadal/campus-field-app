<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказ таблички</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f6fa;--surface:#ffffff;--surface2:#f0f2f8;
  --border:#e2e5ef;--accent:#4361ee;--accent2:#0db87e;
  --warn:#f59e0b;--danger:#ef4444;--text:#1a1d2e;--muted:#6b7280;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:24px 16px}
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:22px;font-weight:600;margin-bottom:4px}
.header p{font-size:13px;color:var(--muted)}
.step-bar{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface)}
.step{flex:1;padding:10px 4px;text-align:center;font-size:11px;color:var(--muted);border-right:1px solid var(--border);font-family:var(--mono);transition:all 0.15s}
.step:last-child{border-right:none}
.step.active{background:#eef2ff;color:var(--accent);font-weight:500}
.step.done{background:#f0fdf4;color:var(--accent2)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card-title{font-size:14px;font-weight:600;margin-bottom:16px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;background:#f8f9fc;border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;transition:border-color 0.15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:90px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;font-family:var(--sans)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3a56d4}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-success{background:rgba(13,184,126,0.12);color:var(--accent2);border:1px solid rgba(13,184,126,0.3)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:4px}
.tmpl-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.15s;background:var(--surface)}
.tmpl-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.tmpl-card.sel{border:2px solid var(--accent);background:#eef2ff}
.tmpl-thumb{width:100%;height:82px;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid var(--border)}
.tmpl-thumb img{max-width:100%;max-height:100%;object-fit:contain}
.tmpl-body{padding:8px 10px}
.tmpl-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmpl-dims{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.custom-card{border:1px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:112px;cursor:pointer;transition:all 0.15s;color:var(--muted);font-size:12px;gap:6px}
.custom-card:hover,.custom-card.sel{border-color:var(--accent);color:var(--accent);background:#eef2ff}
.custom-card .icon{font-size:22px}
.size-ctrl{display:flex;align-items:center;gap:10px}
.size-ctrl button{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:var(--mono)}
.size-ctrl button:hover{border-color:var(--accent);color:var(--accent)}
.size-val{min-width:36px;text-align:center;font-size:14px;font-weight:500;font-family:var(--mono)}
.mat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.mat-chip{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--muted);transition:all 0.15s}
.mat-chip:hover{border-color:var(--accent)}
.mat-chip.active{border-color:var(--accent);background:#eef2ff;color:var(--accent);font-weight:500}
.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:center;min-height:100px;margin-bottom:8px}
.preview-box canvas{max-width:100%;border-radius:4px}
.preview-dims{text-align:center;font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:4px}
.sign-item{border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;background:var(--surface)}
.sign-item-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.sign-item-num{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--accent)}
.sign-item-body{padding:12px 14px;display:flex;gap:12px;align-items:flex-start}
.add-sign-btn{width:100%;padding:12px;border:1px dashed var(--border);border-radius:10px;background:none;cursor:pointer;color:var(--muted);font-size:13px;font-family:var(--sans);transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
.add-sign-btn:hover{border-color:var(--accent);color:var(--accent);background:#eef2ff}
.summary-box{background:#eef2ff;border:1px solid #c7d2fe;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--accent)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
@media(max-width:600px){.row2{grid-template-columns:1fr}.tmpl-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🪧 Заказ таблички</h1>
    <p>Выберите шаблон, настройте текст и отправьте заказ</p>
  </div>

  <div class="step-bar">
    <div class="step active" id="s1">1. Шаблон</div>
    <div class="step" id="s2">2. Параметры</div>
    <div class="step" id="s3">3. Список</div>
    <div class="step" id="s4">4. Заказ</div>
  </div>

  <!-- STEP 1 -->
  <div id="step1">
    <div class="card">
      <div class="card-title">Выберите шаблон</div>
      <div class="tmpl-grid" id="client-grid">
        <div class="empty" style="grid-column:1/-1">Загрузка шаблонов...</div>
      </div>
    </div>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none">
    <div id="sel-info-box"></div>
    <div class="card">
      <div class="card-title">Параметры таблички</div>
      <div class="row2">
        <div class="fg"><label>Ширина (мм)</label><input type="number" id="p-w" min="10" placeholder="150" oninput="livePreview()"></div>
        <div class="fg"><label>Высота (мм)</label><input type="number" id="p-h" min="5" placeholder="80" oninput="livePreview()"></div>
      </div>
      <div class="row2">
        <div class="fg">
          <label>Размер текста</label>
          <div class="size-ctrl">
            <button onclick="chSize(-1)">−</button>
            <span class="size-val" id="size-val">24</span>
            <button onclick="chSize(1)">+</button>
            <span style="font-size:11px;color:var(--muted)">пт</span>
          </div>
        </div>
        <div class="fg">
          <label>Шрифт</label>
          <select id="p-font" onchange="livePreview()">
            <option value="Arial, sans-serif">Arial</option>
            <option value="'Times New Roman', serif">Times New Roman</option>
            <option value="'Courier New', monospace">Courier New</option>
          </select>
        </div>
      </div>
      <div class="fg" id="mat-field" style="display:none">
        <label>Материал</label>
        <div class="mat-chips" id="mat-chips"></div>
      </div>
      <div class="fg">
        <label>Текст на табличке <span style="font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0">(можно несколько строк)</span></label>
        <textarea id="p-text" placeholder="Введите текст&#10;Можно несколько строк" oninput="livePreview()"></textarea>
      </div>
      <div class="card-title" style="margin-bottom:8px;font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.06em">Предварительный макет</div>
      <div class="preview-box" id="live-preview-box"></div>
      <div class="preview-dims" id="live-dims"></div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="backFrom2()">← Назад</button>
        <button class="btn btn-primary" id="btn-add" onclick="addToList()">+ Добавить в список</button>
      </div>
    </div>
  </div>

  <!-- STEP 3 -->
  <div id="step3" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="card-title" style="margin:0">Список табличек</div>
        <span id="signs-count" style="font-size:12px;color:var(--muted);font-family:var(--mono)"></span>
      </div>
      <div id="signs-list"></div>
      <button class="add-sign-btn" onclick="addAnother()">+ Добавить ещё табличку с теми же параметрами</button>
      <div class="actions">
        <button class="btn btn-ghost" onclick="goStep(1)">← Новый шаблон</button>
        <button class="btn btn-primary" onclick="goStep(4)">Оформить заказ →</button>
      </div>
    </div>
  </div>

  <!-- STEP 4 -->
  <div id="step4" style="display:none">
    <div class="card">
      <div class="card-title">Оформление заказа</div>
      <div id="order-summary" class="summary-box" style="margin-bottom:16px"></div>
      <div class="fg"><label>Ваше имя</label><input type="text" id="cname" placeholder="Имя клиента"></div>
      <div class="fg"><label>Телефон / Email</label><input type="text" id="ccontact" placeholder="+972..."></div>
      <div class="fg"><label>Примечание</label><input type="text" id="cnote" placeholder="Срочность, цвет, доп. пожелания..."></div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="goStep(3)">← Назад</button>
        <button class="btn btn-primary" onclick="submitOrder()">✉ Отправить заказ</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://pvaogqxpbkwxarbgzvpi.supabase.co';
const ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2YW9ncXhwYmt3eGFyYmd6dnBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTY4NTYsImV4cCI6MjA5NDczMjg1Nn0.ib17U3NvpLjVSm1GZ5eeXT79hiLfZaAKt2nALLMKHUY';
const H={'apikey':ANON_KEY,'Authorization':'Bearer '+ANON_KEY,'Content-Type':'application/json'};
async function api(path,method='GET',body=null){
  const r=await fetch(SUPA_URL+'/rest/v1/'+path,{method,headers:H,body:body?JSON.stringify(body):null});
  if(!r.ok)throw new Error(await r.text());
  return method==='DELETE'?null:r.json();
}
function toast(msg,dur=3000){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}

let templates=[],materials=[],signsList=[],selTemplate=null,editingIdx=-1,fontSize=24,selFont='Arial, sans-serif',selMat='';

async function init(){
  try{
    templates=await api('sign_templates?order=created_at.asc');
    materials=await api('sign_materials?order=created_at.asc');
  }catch(e){templates=[];materials=[];}
  renderClientGrid();
}

function renderClientGrid(){
  const g=document.getElementById('client-grid');
  let html=templates.map(t=>`
    <div class="tmpl-card" id="tc-${t.id}" onclick="selectTmpl('${t.id}')">
      <div class="tmpl-thumb">${t.image_base64?`<img src="${t.image_base64}" alt="${esc(t.name)}">`:`<span style="font-size:11px;color:var(--muted);text-align:center;padding:8px">${esc(t.name)}</span>`}</div>
      <div class="tmpl-body">
        <div class="tmpl-name">${esc(t.name)}</div>
        <div class="tmpl-dims">${t.width_mm&&t.height_mm?t.width_mm+'×'+t.height_mm+' мм':t.description||'—'}</div>
      </div>
    </div>`).join('');
  html+=`<div class="custom-card" id="tc-custom" onclick="selectTmpl('custom')">
    <div class="icon">⚙</div>
    <span style="font-weight:500">Свой размер</span>
    <span style="font-size:11px">Указать параметры</span>
  </div>`;
  g.innerHTML=html;
}

function selectTmpl(id){
  document.querySelectorAll('.tmpl-card,.custom-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('tc-'+id)?.classList.add('sel');
  selTemplate=id==='custom'?{id:'custom',name:'Свой размер',width_mm:0,height_mm:0,image_base64:''}:templates.find(t=>t.id===id);
  signsList=[];editingIdx=-1;
  goStep(2);
}

function goStep(n){
  [1,2,3,4].forEach(i=>{
    document.getElementById('step'+i).style.display=i===n?'block':'none';
    const s=document.getElementById('s'+i);
    s.className='step'+(i===n?' active':i<n?' done':'');
  });
  if(n===2)initParams();
  if(n===3)renderSignsList();
  if(n===4)renderOrderSummary();
  window.scrollTo({top:0,behavior:'smooth'});
}

function initParams(){
  const box=document.getElementById('sel-info-box');
  if(selTemplate.id!=='custom'&&selTemplate.image_base64){
    box.innerHTML=`<div style="display:flex;gap:12px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px">
      <img src="${selTemplate.image_base64}" style="height:48px;max-width:72px;object-fit:contain;border-radius:4px">
      <div><div style="font-size:14px;font-weight:600">${esc(selTemplate.name)}</div>
      <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${selTemplate.width_mm&&selTemplate.height_mm?selTemplate.width_mm+'×'+selTemplate.height_mm+' мм — можно изменить':''}</div></div>
    </div>`;
  } else box.innerHTML='';

  if(editingIdx>=0&&signsList[editingIdx]){
    const s=signsList[editingIdx];
    document.getElementById('p-w').value=s.w;
    document.getElementById('p-h').value=s.h;
    document.getElementById('p-text').value=s.text;
    fontSize=s.fontSize;selFont=s.font;selMat=s.material||'';
    document.getElementById('p-font').value=selFont;
    document.getElementById('btn-add').textContent='💾 Сохранить';
  } else {
    const last=signsList.length>0?signsList[signsList.length-1]:null;
    document.getElementById('p-w').value=last?last.w:(selTemplate.width_mm||'');
    document.getElementById('p-h').value=last?last.h:(selTemplate.height_mm||'');
    document.getElementById('p-text').value='';
    if(last){fontSize=last.fontSize;selFont=last.font;selMat=last.material||'';}
    else{fontSize=24;selFont='Arial, sans-serif';selMat='';}
    document.getElementById('p-font').value=selFont;
    document.getElementById('btn-add').textContent='+ Добавить в список';
  }
  document.getElementById('size-val').textContent=fontSize;

  const mf=document.getElementById('mat-field');
  const mc=document.getElementById('mat-chips');
  if(materials.length){
    mf.style.display='block';
    mc.innerHTML=materials.map(m=>`<div class="mat-chip${selMat===m.name?' active':''}" onclick="pickMat('${esc(m.name)}')">${esc(m.name)}${m.description?` <span style="opacity:0.6;font-size:10px">· ${esc(m.description)}</span>`:''}</div>`).join('');
  } else mf.style.display='none';
  livePreview();
}

function backFrom2(){signsList.length>0?goStep(3):goStep(1);}
function pickMat(name){selMat=name;document.querySelectorAll('.mat-chip').forEach(c=>c.classList.toggle('active',c.textContent.trim().startsWith(name)));}
function chSize(d){fontSize=Math.max(6,Math.min(80,fontSize+d));document.getElementById('size-val').textContent=fontSize;livePreview();}

function drawSign(canvas,w,h,text,fs,font,maxH){
  const scale=Math.min(540/w,(maxH||190)/h,3);
  const pw=Math.round(w*scale),ph=Math.round(h*scale);
  canvas.width=pw+36;canvas.height=ph+28;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,pw,ph);
  ctx.strokeStyle='#4361ee';ctx.lineWidth=1.5;ctx.strokeRect(0.75,0.75,pw-1.5,ph-1.5);
  const m=Math.max(3,Math.min(pw,ph)*0.06);
  ctx.lineWidth=0.7;ctx.strokeRect(m,m,pw-2*m,ph-2*m);
  const lines=(text||'').split('\n');
  const sfs=Math.min(fs*scale*0.75,ph*0.7/Math.max(lines.length,1));
  const lh=sfs*1.35,tot=lines.length*lh;
  const sy=ph/2-tot/2+sfs*0.85;
  ctx.fillStyle='#4361ee';ctx.font=`500 ${sfs}px ${font}`;ctx.textAlign='center';
  lines.forEach((l,i)=>ctx.fillText(l,pw/2,sy+i*lh,pw-m*3));
  ctx.strokeStyle='#c7d2fe';ctx.lineWidth=0.7;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(0,ph+8);ctx.lineTo(pw,ph+8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pw+7,0);ctx.lineTo(pw+7,ph);ctx.stroke();
  ctx.setLineDash([]);
  const dfs=Math.max(8,Math.round(scale*2.2));
  ctx.fillStyle='#6b7280';ctx.font=`${dfs}px IBM Plex Mono, monospace`;ctx.textAlign='center';
  ctx.fillText(w+' мм',pw/2,ph+20);
  ctx.save();ctx.translate(pw+24,ph/2);ctx.rotate(-Math.PI/2);ctx.fillText(h+' мм',0,0);ctx.restore();
}

function livePreview(){
  const w=parseFloat(document.getElementById('p-w').value)||150;
  const h=parseFloat(document.getElementById('p-h').value)||80;
  const text=document.getElementById('p-text').value||'';
  selFont=document.getElementById('p-font').value;
  const box=document.getElementById('live-preview-box');
  let c=box.querySelector('canvas');
  if(!c){c=document.createElement('canvas');box.appendChild(c);}
  drawSign(c,w,h,text,fontSize,selFont,190);
  const fn=document.getElementById('p-font').options[document.getElementById('p-font').selectedIndex].text;
  document.getElementById('live-dims').textContent=`${w} × ${h} мм · ${fn} · ${fontSize}пт${selMat?' · '+selMat:''}`;
}

function addToList(){
  const w=parseFloat(document.getElementById('p-w').value)||150;
  const h=parseFloat(document.getElementById('p-h').value)||80;
  const text=document.getElementById('p-text').value||'';
  selFont=document.getElementById('p-font').value;
  const fn=document.getElementById('p-font').options[document.getElementById('p-font').selectedIndex].text;
  const sign={w,h,text,fontSize,font:selFont,fontName:fn,material:selMat,templateName:selTemplate.name};
  if(editingIdx>=0){signsList[editingIdx]=sign;}else{signsList.push(sign);}
  editingIdx=-1;
  goStep(3);
}
function addAnother(){editingIdx=-1;goStep(2);}
function editSign(i){editingIdx=i;goStep(2);}
function deleteSign(i){
  if(signsList.length===1){alert('Должна быть хотя бы одна табличка');return;}
  if(!confirm('Удалить?'))return;
  signsList.splice(i,1);renderSignsList();
}

function renderSignsList(){
  const el=document.getElementById('signs-list');
  document.getElementById('signs-count').textContent=signsList.length+' шт';
  el.innerHTML=signsList.map((s,i)=>{
    const c=document.createElement('canvas');
    drawSign(c,s.w,s.h,s.text,s.fontSize,s.font,80);
    return `<div class="sign-item">
      <div class="sign-item-hdr">
        <span class="sign-item-num">№${i+1}</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="editSign(${i})">✏ Изменить</button>
          <button class="btn" style="padding:4px 10px;font-size:11px;background:rgba(239,68,68,0.08);color:#ef4444;border:1px solid rgba(239,68,68,0.2)" onclick="deleteSign(${i})">✕</button>
        </div>
      </div>
      <div class="sign-item-body">
        <img src="${c.toDataURL()}" style="height:58px;max-width:100px;object-fit:contain;border-radius:4px;border:1px solid var(--border);flex-shrink:0">
        <div>
          <div style="font-size:13px;font-weight:500;white-space:pre-line;margin-bottom:4px">${esc(s.text)||'<span style="color:var(--muted)">(без текста)</span>'}</div>
          <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${s.w}×${s.h}мм · ${esc(s.fontName)} ${s.fontSize}пт${s.material?' · '+esc(s.material):''}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderOrderSummary(){
  document.getElementById('order-summary').innerHTML=
    `<b>${signsList.length} ${signsList.length===1?'табличка':signsList.length<5?'таблички':'табличек'}:</b> `+
    signsList.map((s,i)=>`№${i+1} ${esc(s.text.replace(/\n/g,' / ').substring(0,30))||'—'} (${s.w}×${s.h}мм)`).join(' · ');
}

async function submitOrder(){
  const name=document.getElementById('cname').value.trim();
  if(!name){alert('Введите имя');return;}
  const contact=document.getElementById('ccontact').value.trim();
  const note=document.getElementById('cnote').value.trim();
  const header='"№","шаблон","текст","ширина_мм","высота_мм","шрифт","размер_пт","материал"';
  const rows=signsList.map((s,i)=>`"${i+1}","${esc2(s.templateName)}","${esc2(s.text)}","${s.w}","${s.h}","${esc2(s.fontName)}","${s.fontSize}","${esc2(s.material||'')}"`);
  const csv_data=header+'\r\n'+rows.join('\r\n');
  try{
    await api('sign_orders','POST',{
      client_name:name,client_contact:contact||null,note:note||null,
      is_new:true,signs:signsList,csv_data
    });
    toast('✅ Заказ отправлен! Мы свяжемся с вами.');
    signsList=[];selTemplate=null;
    ['cname','ccontact','cnote'].forEach(id=>document.getElementById(id).value='');
    goStep(1);
  }catch(e){alert('Ошибка отправки: '+e.message);}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function esc2(s){return String(s||'').replace(/"/g,'""').replace(/\n/g,' ');}
init();
</script>
</body>
</html>
